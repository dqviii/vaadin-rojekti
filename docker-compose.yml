services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: movies
      POSTGRES_USER: movies
      POSTGRES_PASSWORD: movies
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movies -d movies"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/movies
      SPRING_DATASOURCE_USERNAME: movies
      SPRING_DATASOURCE_PASSWORD: movies
    ports:
      - "8080:8080"

volumes:
  db-data:
